version: '3.9'

services:
  web:
    build: .
    command: /entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword

  redis:
    image: redis:7

  celery:
    build: .
    entrypoint: /celery-entrypoint.sh
    command: celery -A config worker -l info
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    entrypoint: /celery-entrypoint.sh
    command: celery -A config beat -l info
    depends_on:
      - redis
      - db